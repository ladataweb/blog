---
layout: default
title: Archivo
permalink: /archive/
---

<section class="archive">
  <header class="archive__header">
    <p class="home__kicker">Archivo</p>
    <h1 class="home__title">Todos los artículos</h1>
  </header>

  <div class="archive-tools">
    <input id="archive-search" class="archive-tools__search" type="search" placeholder="Buscar por título...">

    <select id="archive-tag-filter" class="archive-tools__select">
      <option value="">Todos los tags</option>
      {% assign sorted_tags = site.tags | sort %}
      {% for tag in sorted_tags %}
        <option value="{{ tag[0] | downcase }}">{{ tag[0] }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="archive__list" id="archive-list">
    {% for post in site.posts %}
      <article
        class="archive__item"
        data-title="{{ post.title | downcase | escape }}"
        data-tags="{% for tag in post.tags %}{{ tag | downcase }} {% endfor %}">
        <time class="archive__date" datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: "%Y-%m-%d" }}
        </time>
        <div>
          <h2 class="archive__title">
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
          </h2>
          {% if post.tags and post.tags.size > 0 %}
            <div class="post-card__tags">
              {% for tag in post.tags limit:5 %}
                <span class="tag">{{ tag }}</span>
              {% endfor %}
            </div>
          {% endif %}
        </div>
      </article>
    {% endfor %}
  </div>
</section>

<script>
  (function () {
    var searchInput = document.getElementById('archive-search');
    var tagFilter = document.getElementById('archive-tag-filter');
    var items = Array.prototype.slice.call(document.querySelectorAll('#archive-list .archive__item'));
    var params = new URLSearchParams(window.location.search);
    var initialQuery = (params.get('q') || '').toLowerCase();

    if (searchInput) searchInput.value = initialQuery;

    function applyFilters() {
      var query = (searchInput.value || '').trim().toLowerCase();
      var tag = (tagFilter.value || '').trim().toLowerCase();

      items.forEach(function (item) {
        var title = item.getAttribute('data-title') || '';
        var tags = item.getAttribute('data-tags') || '';

        var matchesQuery = !query || title.indexOf(query) !== -1;
        var matchesTag = !tag || tags.indexOf(tag) !== -1;

        item.style.display = (matchesQuery && matchesTag) ? '' : 'none';
      });
    }

    if (searchInput) searchInput.addEventListener('input', applyFilters);
    if (tagFilter) tagFilter.addEventListener('change', applyFilters);

    applyFilters();
  })();
</script>
